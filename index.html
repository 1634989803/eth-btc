<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC/ETH 定投指标</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="header">
        <h1>📊 定投指标</h1>
        <p class="subtitle">BTC AHR999 · ETH 阶梯定投</p>
        <div class="coin-tabs">
            <button class="coin-tab active" onclick="switchCoin('ETH')">ETH 以太坊</button>
            <button class="coin-tab" onclick="switchCoin('BTC')">BTC 比特币</button>
        </div>
    </header>

    <div class="card" id="loading">
        <p style="text-align:center;padding:40px;color:#999;">加载中...</p>
    </div>

    <div class="card main-card" id="mainCard" style="display:none;">
        <div class="coin-badge" id="coinBadge">ETH</div>
        <div class="ratio-display" id="indicatorDisplay">--</div>
        <div class="zone-display" id="zoneDisplay">--</div>
        <div class="action-text" id="actionText">--</div>
        <div class="price-info" id="priceInfo">--</div>
    </div>

    <div class="card" id="detailCard" style="display:none;">
        <h3>详细数据</h3>
        <table class="data-table" id="dataTable"></table>
    </div>

    <div class="card">
        <h3>区间说明</h3>
        <div id="zoneList"></div>
    </div>

    <div class="card" id="chartCard" style="display:none;">
        <h3>近 <span id="chartDays">--</span> 天走势</h3>
        <div class="chart-bars" id="chartBars"></div>
    </div>

    <footer class="footer">
        <p>数据: CoinGecko · 每6小时更新 · 仅供参考</p>
    </footer>
</div>

<script>
let allData = {};

const ETH_ZONES = [
    { min: 0, max: 0.35, name: '梭哈区', icon: '💜', action: '5倍定投, 重仓买入', color: '#9b59b6', bg: '#f3e8ff' },
    { min: 0.35, max: 0.45, name: '重仓区', icon: '💚', action: '3倍定投, 大幅加仓', color: '#27ae60', bg: '#e8f8f0' },
    { min: 0.45, max: 0.65, name: '定投区', icon: '💛', action: '1倍定投, 正常节奏', color: '#f39c12', bg: '#fff8e8' },
    { min: 0.65, max: 1.60, name: '轻投区', icon: '🔵', action: '0.5倍定投, 小额分批', color: '#3498db', bg: '#e8f4fd' },
    { min: 1.60, max: Infinity, name: '止盈区', icon: '🔴', action: '分批卖出', color: '#e74c3c', bg: '#fde8e8' },
];

const BTC_ZONES = [
    { min: 0, max: 0.45, name: '抄底区', icon: '🟣', action: '适合抄底', color: '#9b59b6', bg: '#f3e8ff' },
    { min: 0.45, max: 1.20, name: '定投区', icon: '🟢', action: '正常定投', color: '#27ae60', bg: '#e8f8f0' },
    { min: 1.20, max: Infinity, name: '持有区', icon: '🟡', action: '暂停买入', color: '#f39c12', bg: '#fff8e8' },
];

function getZones(coin) {
    return coin === 'BTC' ? BTC_ZONES : ETH_ZONES;
}

function getZone(coin, indicator) {
    return getZones(coin).find(z => indicator >= z.min && indicator < z.max) || getZones(coin)[getZones(coin).length - 1];
}

async function fetchLivePrice(coin) {
    try {
        const id = coin === 'ETH' ? 'ethereum' : 'bitcoin';
        const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd`);
        const d = await r.json();
        return d[id]?.usd;
    } catch { return null; }
}

async function switchCoin(coin) {
    document.querySelectorAll('.coin-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.coin-tab[onclick*="${coin}"]`).classList.add('active');
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">加载中...</p>';
    document.getElementById('mainCard').style.display = 'none';
    document.getElementById('detailCard').style.display = 'none';
    document.getElementById('chartCard').style.display = 'none';
    
    // 从 data.json 拿历史数据
    const coinData = allData[coin];
    if (!coinData) {
        document.getElementById('loading').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">暂无数据</p>';
        return;
    }
    
    const latest = coinData.latest;
    const history = coinData.history || [];
    const zone = getZone(coin, latest.indicator);
    
    // 同时拿实时价格
    const livePrice = await fetchLivePrice(coin);
    const displayPrice = livePrice || latest.price;
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('mainCard').style.display = 'block';
    document.getElementById('detailCard').style.display = 'block';
    
    const mc = document.getElementById('mainCard');
    mc.style.borderTop = `4px solid ${zone.color}`;
    document.getElementById('coinBadge').textContent = coin;
    document.getElementById('indicatorDisplay').textContent = latest.indicator;
    document.getElementById('indicatorDisplay').style.color = zone.color;
    document.getElementById('zoneDisplay').textContent = zone.icon + ' ' + zone.name;
    document.getElementById('zoneDisplay').style.background = zone.bg;
    document.getElementById('zoneDisplay').style.color = zone.color;
    document.getElementById('actionText').textContent = '→ ' + zone.action;
    const liveTag = livePrice ? ' (实时)' : '';
    document.getElementById('priceInfo').innerHTML = `价格: $${Number(displayPrice).toLocaleString()}${liveTag} · 更新: ${latest.date}`;
    
    // 详细数据
    const tbl = document.getElementById('dataTable');
    let rows = `<tr><td>指标值</td><td class="value" style="color:${zone.color};font-weight:bold;">${latest.indicator}</td></tr>`;
    rows += `<tr><td>当前区域</td><td class="value">${zone.icon} ${zone.name}</td></tr>`;
    rows += `<tr><td>策略</td><td class="value">${zone.action}</td></tr>`;
    rows += `<tr><td>价格</td><td class="value">$${Number(latest.price).toLocaleString()}</td></tr>`;
    if (livePrice) {
        rows += `<tr><td>实时价格</td><td class="value" style="color:#27ae60;">$${Number(livePrice).toLocaleString()}</td></tr>`;
    }
    tbl.innerHTML = rows;
    
    // 区间说明
    document.getElementById('zoneList').innerHTML = getZones(coin).map(z =>
        `<div class="zone-item" style="border-left:4px solid ${z.color};">
            <span>${z.icon}</span>
            <span style="font-weight:600;min-width:50px;">${z.name}</span>
            <span style="color:#999;font-size:12px;">(< ${z.max === Infinity ? '∞' : z.max})</span>
            <span style="margin-left:auto;color:#666;">→ ${z.action}</span>
        </div>`
    ).join('');
    
    // 走势图
    if (history.length > 1) {
        document.getElementById('chartCard').style.display = 'block';
        document.getElementById('chartDays').textContent = history.length;
        const vals = history.map(h => h.indicator);
        const minV = Math.min(...vals);
        const maxV = Math.max(...vals);
        const range = maxV - minV || 1;
        
        document.getElementById('chartBars').innerHTML = history.map((h, i) => {
            const z = getZone(coin, h.indicator);
            const ht = ((h.indicator - minV) / range) * 100;
            const label = (i % 5 === 0 || i === history.length - 1) ? `<div style="font-size:10px;color:#999;margin-top:4px;transform:rotate(-45deg);white-space:nowrap;">${h.date.slice(5)}</div>` : '';
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;" title="${h.date}: ${h.indicator}">
                <div style="width:100%;border-radius:3px 3px 0 0;min-height:4px;height:${Math.max(ht,5)}%;background:${z.color};"></div>
                ${label}
            </div>`;
        }).join('');
    }
}

(async function() {
    try {
        const [eth, btc] = await Promise.all([
            fetch('eth_data.json?_=' + Date.now()).then(r => r.json()).catch(() => null),
            fetch('btc_data.json?_=' + Date.now()).then(r => r.json()).catch(() => null),
        ]);
        if (eth) allData['ETH'] = eth;
        if (btc) allData['BTC'] = btc;
        switchCoin(eth ? 'ETH' : 'BTC');
    } catch(e) {
        document.getElementById('loading').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">加载失败</p>';
    }
})();
</script>
</body>
</html>
