<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETH/BTC 定投指标监控</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="header">
        <h1>📊 定投指标监控</h1>
        <p class="subtitle">ETH/BTC 阶梯定投指数 · 每日更新</p>
        <div class="coin-tabs" id="coinTabs">
            <button class="coin-tab active" data-coin="ETH">ETH 以太坊</button>
            <button class="coin-tab" data-coin="BTC">BTC 比特币</button>
        </div>
    </header>

    <!-- 加载状态 -->
    <div class="card" id="loading">
        <p style="text-align:center;padding:40px;color:#999;">⏳ 加载数据中...</p>
    </div>

    <!-- 主指标卡 -->
    <div class="card main-card" id="mainCard" style="display:none;">
        <div class="coin-badge" id="coinBadge">ETH</div>
        <div class="ratio-display" id="ratioDisplay">--</div>
        <div class="zone-display" id="zoneDisplay">--</div>
        <div class="action-text" id="actionText">--</div>
        <div class="price-info" id="priceInfo">--</div>
    </div>

    <!-- 详细数据 -->
    <div class="card" id="detailCard" style="display:none;">
        <h3>📋 详细数据</h3>
        <table class="data-table" id="dataTable">
            <tr><td>SMA 120 (中期成本线)</td><td class="value" id="sma120">--</td></tr>
            <tr><td>EMA 250 (长期估值线)</td><td class="value" id="ema250">--</td></tr>
            <tr><td>偏离度指数</td><td class="value" id="ratioValue">--</td></tr>
            <tr><td>当前区域</td><td class="value" id="zoneValue">--</td></tr>
            <tr><td>更新于</td><td class="value" id="updateTime">--</td></tr>
        </table>
    </div>

    <!-- 区间说明 -->
    <div class="card">
        <h3>📖 区间说明</h3>
        <div class="zone-list" id="zoneList"></div>
    </div>

    <!-- 趋势图 -->
    <div class="card" id="chartCard" style="display:none;">
        <h3>📈 近 <span id="chartDays">30</span> 天趋势</h3>
        <div class="chart" id="chart">
            <div class="chart-bars" id="chartBars"></div>
            <div class="chart-ref" id="chartRef"></div>
        </div>
    </div>

    <!-- 友链 -->
    <div class="card" id="linksCard" style="display:none;">
        <h3>🔗 友情链接</h3>
        <div class="links-list" id="linksList"></div>
    </div>

    <footer class="footer">
        <p>数据来源: Binance · 由 GitHub Actions 自动更新 · 不构成投资建议</p>
    </footer>
</div>

<script>
// 数据配置
const CONFIG = {
    ETH: { thresh_allin: 0.35, thresh_heavy: 0.45, thresh_dca: 0.65, thresh_sell: 1.60 },
    BTC: { thresh_allin: 0.35, thresh_heavy: 0.45, thresh_dca: 0.65, thresh_sell: 1.60 },
};

const ZONES = [
    { id: 'allin',   name: '梭哈区', icon: '💜', action: '5倍定投，分批重仓买入', color: '#9b59b6', bg: '#f3e8ff' },
    { id: 'heavy',   name: '重仓区', icon: '💚', action: '3倍定投，大幅加仓',    color: '#27ae60', bg: '#e8f8f0' },
    { id: 'dca',     name: '定投区', icon: '💛', action: '1倍定投，正常建仓',    color: '#f39c12', bg: '#fff8e8' },
    { id: 'hold',    name: '持有区', icon: '⬜', action: '持仓不动，暂停定投',     color: '#7f8c8d', bg: '#f5f5f5' },
    { id: 'sell',    name: '止盈区', icon: '🔴', action: '分批卖出，锁定利润',     color: '#e74c3c', bg: '#fde8e8' },
];

function getZone(ratio, config) {
    if (ratio < config.thresh_allin) return ZONES[0];
    if (ratio < config.thresh_heavy) return ZONES[1];
    if (ratio < config.thresh_dca)   return ZONES[2];
    if (ratio < config.thresh_sell)  return ZONES[3];
    return ZONES[4];
}

function formatPrice(n) {
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function render(data, coin) {
    if (!data || !data.latest) {
        document.getElementById('loading').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">❌ 暂无数据，等待首次采集...</p>';
        return;
    }

    const config = CONFIG[coin] || CONFIG.ETH;
    const latest = data.latest;
    const zone = getZone(latest.ratio, config);

    // 主卡
    document.getElementById('loading').style.display = 'none';
    document.getElementById('mainCard').style.display = 'block';
    document.getElementById('detailCard').style.display = 'block';

    const mainCard = document.getElementById('mainCard');
    mainCard.style.borderTop = `4px solid ${zone.color}`;
    document.getElementById('coinBadge').textContent = coin;
    document.getElementById('ratioDisplay').textContent = latest.ratio;
    document.getElementById('ratioDisplay').style.color = zone.color;
    document.getElementById('zoneDisplay').textContent = zone.icon + ' ' + zone.name;
    document.getElementById('zoneDisplay').style.background = zone.bg;
    document.getElementById('zoneDisplay').style.color = zone.color;
    document.getElementById('actionText').textContent = '→ ' + zone.action;
    document.getElementById('priceInfo').textContent = '当前价格: ' + formatPrice(latest.price) + ' · 更新于 ' + latest.date;

    // 详细数据
    document.getElementById('sma120').textContent = formatPrice(latest.sma120);
    document.getElementById('ema250').textContent = formatPrice(latest.ema250);
    document.getElementById('ratioValue').textContent = latest.ratio;
    document.getElementById('ratioValue').style.color = zone.color;
    document.getElementById('zoneValue').textContent = zone.icon + ' ' + zone.name;
    document.getElementById('updateTime').textContent = data.config?.last_update || latest.date;

    // 区间说明
    const zoneList = document.getElementById('zoneList');
    zoneList.innerHTML = ZONES.map(z => `
        <div class="zone-item" style="border-left: 4px solid ${z.color};">
            <span class="zone-icon">${z.icon}</span>
            <span class="zone-name">${z.name}</span>
            <span class="zone-range">(< ${z.id === 'sell' ? '∞' : config[`thresh_${z.id === 'allin' ? 'allin' : z.id === 'heavy' ? 'heavy' : z.id === 'dca' ? 'dca' : 'sell'}`]})</span>
            <span class="zone-action">→ ${z.action}</span>
        </div>
    `).join('');

    // 趋势图
    if (data.history && data.history.length > 1) {
        const chartCard = document.getElementById('chartCard');
        chartCard.style.display = 'block';
        document.getElementById('chartDays').textContent = data.history.length;

        const history = data.history;
        const ratios = history.map(h => h.ratio);
        const minR = Math.min(...ratios);
        const maxR = Math.max(...ratios);
        const range = maxR - minR || 1;

        const bars = document.getElementById('chartBars');
        bars.innerHTML = history.map((h, i) => {
            const z = getZone(h.ratio, config);
            const ht = ((h.ratio - minR) / range) * 100;
            const label = (i % 5 === 0 || i === history.length - 1) ? `<div class="bar-label">${h.date.slice(5)}</div>` : '';
            return `<div class="bar-wrap" title="${h.date}: ${h.ratio}">
                <div class="bar" style="height:${Math.max(ht, 5)}%;background:${z.color};"></div>
                ${label}
            </div>`;
        }).join('');

        const ref = document.getElementById('chartRef');
        ref.innerHTML = `
            <span>💜 梭哈 ${config.thresh_allin}</span>
            <span>💚 重仓 ${config.thresh_heavy}</span>
            <span>💛 定投 ${config.thresh_dca}</span>
            <span>🔴 止盈 ${config.thresh_sell}</span>
        `;
    }

    // 友链
    if (data.links && data.links.length > 0) {
        const linksCard = document.getElementById('linksCard');
        linksCard.style.display = 'block';
        document.getElementById('linksList').innerHTML = data.links.map(l =>
            `<a href="${l.url}" target="_blank" rel="noopener" class="link-item">${l.name}</a>`
        ).join('');
    }
}

// 切换币种
document.querySelectorAll('.coin-tab').forEach(tab => {
    tab.addEventListener('click', async function() {
        document.querySelectorAll('.coin-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');

        const coin = this.dataset.coin;
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        loading.innerHTML = '<p style="text-align:center;padding:40px;color:#999;">⏳ 加载 ' + coin + ' 数据...</p>';
        document.getElementById('mainCard').style.display = 'none';
        document.getElementById('detailCard').style.display = 'none';

        try {
            const resp = await fetch('data.json?_=' + Date.now());
            const data = await resp.json();
            render(data, coin);
        } catch (e) {
            loading.innerHTML = '<p style="text-align:center;padding:40px;color:#999;">❌ 数据加载失败</p>';
        }
    });
});

// 初始加载
(async function() {
    try {
        const resp = await fetch('data.json?_=' + Date.now());
        const data = await resp.json();
        render(data, 'ETH');
    } catch (e) {
        document.getElementById('loading').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">❌ 数据加载失败，请确保 data.json 存在</p>';
    }
})();
</script>
</body>
</html>
