name: 定投指标更新

on:
  schedule:
    - cron: '45 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 获取美股基准数据
      - name: 安装依赖
        run: pip install yfinance -q
      - name: 获取基准数据
        run: python scripts/fetch_benchmarks.py

      # ETH 指标
      - name: ETH 指标
        env:
          COIN: ETH
          MA_SHORT: 120
          MA_LONG: 250
          THRESH_ALLIN: 0.35
          THRESH_HEAVY: 0.45
          THRESH_DCA: 0.65
          THRESH_SELL: 1.60
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: python scripts/update.py

      # BTC 指标
      - name: BTC 指标
        env:
          COIN: BTC
          MA_SHORT: 120
          MA_LONG: 250
          THRESH_ALLIN: 0.35
          THRESH_HEAVY: 0.45
          THRESH_DCA: 0.65
          THRESH_SELL: 1.60
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: python scripts/update.py

      # 提交
      - name: 提交更新
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add *_data.json benchmarks/
          git diff --staged --quiet || git commit -m "📊 $(date +'%m-%d')"
          git pull --rebase
          git push
