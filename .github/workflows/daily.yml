name: 定投指标更新

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        coin: [ETH, BTC]

    steps:
      - uses: actions/checkout@v4

      - name: 装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 跑指标
        env:
          COIN: ${{ matrix.coin }}
          MA_SHORT: 120
          MA_LONG: 250
          THRESH_ALLIN: 0.35
          THRESH_HEAVY: 0.45
          THRESH_DCA: 0.65
          THRESH_SELL: 1.60
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python scripts/update.py

      - name: 提交更新
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add *_data.json
          git diff --staged --quiet || git commit -m "${{ matrix.coin }} 指标更新 ($(date +'%m-%d %H:%M'))"
          git push
